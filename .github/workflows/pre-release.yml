name: Pre-Release (Alpha/Beta)

on:
  push:
    tags:
      - "isiLive_alpha_*"
      - "isiLive_beta_*"
  workflow_dispatch:
    inputs:
      confirm_release:
        description: "Set to true to allow manual CurseForge pre-release trigger"
        required: true
        type: boolean
        default: false
      channel:
        description: "Pre-release channel"
        required: true
        type: choice
        options:
          - alpha
          - beta
        default: alpha
      release_tag:
        description: "Tag must match selected channel (isiLive_alpha_* or isiLive_beta_*)"
        required: true
        type: string

jobs:
  trigger-curseforge-packager:
    if: ${{ (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/isiLive_alpha_') || startsWith(github.ref, 'refs/tags/isiLive_beta_'))) || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_release == 'true' && ((github.event.inputs.channel == 'alpha' && startsWith(github.event.inputs.release_tag, 'isiLive_alpha_')) || (github.event.inputs.channel == 'beta' && startsWith(github.event.inputs.release_tag, 'isiLive_beta_')))) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Pre-Release Trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          MANUAL_CONFIRM: ${{ github.event.inputs.confirm_release }}
          MANUAL_CHANNEL: ${{ github.event.inputs.channel }}
          MANUAL_TAG: ${{ github.event.inputs.release_tag }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "push" ]; then
            case "${REF}" in
              refs/tags/isiLive_alpha_*|refs/tags/isiLive_beta_*) ;;
              *)
                echo "Blocked: only refs/tags/isiLive_alpha_* or refs/tags/isiLive_beta_* may trigger pre-release."
                exit 1
                ;;
            esac
          elif [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${MANUAL_CONFIRM}" != "true" ]; then
              echo "Blocked: confirm_release must be true for manual pre-release."
              exit 1
            fi
            if [ "${MANUAL_CHANNEL}" = "alpha" ]; then
              case "${MANUAL_TAG}" in
                isiLive_alpha_*) ;;
                *)
                  echo "Blocked: channel alpha requires tag prefix isiLive_alpha_."
                  exit 1
                  ;;
              esac
            elif [ "${MANUAL_CHANNEL}" = "beta" ]; then
              case "${MANUAL_TAG}" in
                isiLive_beta_*) ;;
                *)
                  echo "Blocked: channel beta requires tag prefix isiLive_beta_."
                  exit 1
                  ;;
              esac
            else
              echo "Blocked: unknown channel ${MANUAL_CHANNEL}."
              exit 1
            fi
            tag_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/${MANUAL_TAG}"
            body_file="$(mktemp)"
            code="$(curl -sS -o "${body_file}" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${tag_url}")"
            if [ "${code}" -ne 200 ]; then
              echo "Blocked: manual release_tag does not exist in repo (${MANUAL_TAG})."
              echo "GitHub API response code: ${code}"
              cat "${body_file}"
              rm -f "${body_file}"
              exit 1
            fi
            rm -f "${body_file}"
          else
            echo "Blocked: unsupported event ${EVENT_NAME}."
            exit 1
          fi
      - name: Trigger CurseForge Auto-Packager
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CURSE_PROJECT_ID: ${{ vars.CURSE_PROJECT_ID }}
        run: |
          set -euo pipefail
          case "${CURSE_PROJECT_ID}" in
            ''|*[!0-9]*)
              echo "CURSE_PROJECT_ID must be numeric. Current value is invalid."
              exit 1
              ;;
          esac
          url="https://www.curseforge.com/api/projects/${CURSE_PROJECT_ID}/package?token=${CF_API_KEY}"
          body_file="$(mktemp)"
          code="$(curl -sS -o "${body_file}" -w "%{http_code}" -X POST -d '' "${url}")"
          echo "CurseForge response code: ${code}"
          echo "CurseForge response body:"
          cat "${body_file}"
          rm -f "${body_file}"
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "Failed to trigger CurseForge packager."
            exit 1
          fi
          echo "CurseForge packaging trigger sent."
