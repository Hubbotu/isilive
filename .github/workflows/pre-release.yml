name: Pre-Release (Alpha/Beta)

on:
  push:
    tags:
      - "isiLive_alpha_*"
      - "isiLive_beta_*"
  workflow_dispatch:
    inputs:
      confirm_release:
        description: "Set to true to allow manual CurseForge pre-release trigger"
        required: true
        type: boolean
        default: false
      channel:
        description: "Pre-release channel"
        required: true
        type: choice
        options:
          - alpha
          - beta
        default: alpha
      release_tag:
        description: "Tag must match selected channel (isiLive_alpha_* or isiLive_beta_*)"
        required: true
        type: string

jobs:
  quality-gate:
    if: ${{ (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/isiLive_alpha_') || startsWith(github.ref, 'refs/tags/isiLive_beta_'))) || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_release == 'true' && ((github.event.inputs.channel == 'alpha' && startsWith(github.event.inputs.release_tag, 'isiLive_alpha_')) || (github.event.inputs.channel == 'beta' && startsWith(github.event.inputs.release_tag, 'isiLive_beta_')))) }}
    uses: ./.github/workflows/lua-check.yml
    permissions:
      contents: read

  trigger-curseforge-packager:
    needs: quality-gate
    if: ${{ (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/isiLive_alpha_') || startsWith(github.ref, 'refs/tags/isiLive_beta_'))) || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_release == 'true' && ((github.event.inputs.channel == 'alpha' && startsWith(github.event.inputs.release_tag, 'isiLive_alpha_')) || (github.event.inputs.channel == 'beta' && startsWith(github.event.inputs.release_tag, 'isiLive_beta_')))) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate Pre-Release Trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          MANUAL_CONFIRM: ${{ github.event.inputs.confirm_release }}
          MANUAL_CHANNEL: ${{ github.event.inputs.channel }}
          MANUAL_TAG: ${{ github.event.inputs.release_tag }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pwsh -File tools/validate_release_trigger.ps1 -Mode pre-release
      - name: Trigger CurseForge Auto-Packager
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CURSE_PROJECT_ID: ${{ vars.CURSE_PROJECT_ID }}
        run: |
          set -euo pipefail
          case "${CURSE_PROJECT_ID}" in
            ''|*[!0-9]*)
              echo "CURSE_PROJECT_ID must be numeric. Current value is invalid."
              exit 1
              ;;
          esac
          url="https://www.curseforge.com/api/projects/${CURSE_PROJECT_ID}/package?token=${CF_API_KEY}"
          body_file="$(mktemp)"
          code="$(curl -sS -o "${body_file}" -w "%{http_code}" -X POST -d '' "${url}")"
          echo "CurseForge response code: ${code}"
          echo "CurseForge response body:"
          cat "${body_file}"
          rm -f "${body_file}"
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "Failed to trigger CurseForge packager."
            exit 1
          fi
          echo "CurseForge packaging trigger sent."
