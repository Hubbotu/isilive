name: Release

on:
  push:
    tags:
      - "isiLive_release_*"
  workflow_dispatch:
    inputs:
      confirm_release:
        description: "Set to true to allow manual CurseForge trigger"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag (must start with isiLive_release_)"
        required: true
        type: string

jobs:
  quality-gate:
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/isiLive_release_')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_release == 'true' && startsWith(github.event.inputs.release_tag, 'isiLive_release_')) }}
    uses: ./.github/workflows/lua-check.yml
    permissions:
      contents: read

  trigger-curseforge-packager:
    needs: quality-gate
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/isiLive_release_')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_release == 'true' && startsWith(github.event.inputs.release_tag, 'isiLive_release_')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate Release Trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          MANUAL_CONFIRM: ${{ github.event.inputs.confirm_release }}
          MANUAL_TAG: ${{ github.event.inputs.release_tag }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pwsh -File tools/validate_release_trigger.ps1 -Mode release
      - name: Trigger CurseForge Auto-Packager
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CURSE_PROJECT_ID: ${{ vars.CURSE_PROJECT_ID }}
        run: |
          set -euo pipefail
          case "${CURSE_PROJECT_ID}" in
            ''|*[!0-9]*)
              echo "CURSE_PROJECT_ID must be numeric. Current value is invalid."
              exit 1
              ;;
          esac
          url="https://www.curseforge.com/api/projects/${CURSE_PROJECT_ID}/package?token=${CF_API_KEY}"
          body_file="$(mktemp)"
          code="$(curl -sS -o "${body_file}" -w "%{http_code}" -X POST -d '' "${url}")"
          echo "CurseForge response code: ${code}"
          echo "CurseForge response body:"
          cat "${body_file}"
          rm -f "${body_file}"
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "Failed to trigger CurseForge packager."
            exit 1
          fi
          echo "CurseForge packaging trigger sent."
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          MANUAL_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${MANUAL_TAG}"
          else
            TAG="${REF_NAME}"
          fi
          case "${TAG}" in
            isiLive_release_*) ;;
            *) echo "Unexpected tag '${TAG}' — expected isiLive_release_* prefix."; exit 1 ;;
          esac
          VERSION="${TAG#isiLive_release_}"
          VERSION_RE=$(printf '%s\n' "${VERSION}" | sed 's/\./\\./g')
          NOTES_FILE="$(mktemp)"
          awk -v re="${VERSION_RE}" '
            BEGIN { found=0; inblock=0 }
            {
              if (!inblock && match($0, "^## .* Version " re "[^0-9]")) {
                inblock=1; found=1; print; next
              }
              if (inblock && /^## /) { exit }
              if (inblock) { print }
            }
          ' docs/CHANGELOG.md > "${NOTES_FILE}"
          if [ ! -s "${NOTES_FILE}" ]; then
            echo "No CHANGELOG section found for version ${VERSION} — using fallback body."
            printf '## v%s\n\nSee docs/CHANGELOG.md for release notes.\n' "${VERSION}" > "${NOTES_FILE}"
          fi
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release for tag ${TAG} already exists — updating notes."
            gh release edit "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "v${VERSION}" \
              --notes-file "${NOTES_FILE}"
          else
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "v${VERSION}" \
              --notes-file "${NOTES_FILE}" \
              --latest
          fi
          rm -f "${NOTES_FILE}"
          echo "GitHub Release v${VERSION} published."
