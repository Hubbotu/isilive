name: Lua Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: StyLua (check)
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ github.token }}
          version: "2.3.1"
          args: --check .

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.1"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install luacheck
        run: |
          luarocks install luacheck 1.2.0-1
          echo "$(luarocks path --lr-bin)" >> "$GITHUB_PATH"

      - name: Install LuaFileSystem
        run: luarocks install luafilesystem 1.8.0-1

      - name: Luacheck
        run: |
          command -v luacheck
          luacheck --version || true
          luacheck --exclude-files ".luarocks/**" -- .

      - name: Lua Syntax Check
        run: |
          set -e
          for file in $(find . -type f -name "*.lua" -not -path "./.luarocks/*"); do
            echo "Checking $file"
            tmp="$(mktemp)"
            sed '1s/^\xEF\xBB\xBF//' "$file" > "$tmp"
            lua -e "assert(loadfile('$tmp'))"
            rm -f "$tmp"
          done

      - name: Lua Metrics Check
        run: |
          eval "$(luarocks path --lua-version 5.1)"
          ISILIVE_MAX_FILE_LINES=3200 ISILIVE_MAX_FUNCTION_LINES=420 lua tools/lua_metrics_check.lua

      - name: Locale Drift Check
        run: |
          lua tools/check_locale_drift.lua

      - name: Hardcoded Strings Check
        run: |
          lua tools/check_hardcoded_strings.lua

      - name: M+ Forces DB Lifetime
        run: |
          lua tools/check_mplus_db_lifetime.lua

      - name: Deterministic Usecase + Rules Logic Validation
        run: |
          lua tools/validate_usecases.lua

      - name: Install luacov
        run: luarocks install luacov 0.15.0-1

      - name: Coverage Run
        run: |
          eval "$(luarocks path --lua-version 5.1)"
          lua -lluacov tools/validate_usecases.lua
          luacov

      - name: Coverage Summary
        run: |
          lua tools/coverage_summary.lua luacov.report.out >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            luacov.report.out
            luacov.stats.out
          retention-days: 30
