name: Lua Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install StyLua via cargo
        # Workaround: JohnnyMorganz/stylua-action@v5 downloads from GitHub
        # Releases, but upstream releases were wiped on 2026-04-27. Build
        # from crates.io instead until upstream restores release assets.
        run: cargo install stylua --version 2.3.1 --locked

      - name: StyLua (check)
        run: stylua --check .

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.1"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install luacheck
        run: |
          luarocks install luacheck 1.2.0-1
          echo "$(luarocks path --lr-bin)" >> "$GITHUB_PATH"

      - name: Install LuaFileSystem
        run: luarocks install luafilesystem 1.8.0-1

      - name: Luacheck
        run: |
          command -v luacheck
          luacheck --version || true
          luacheck --exclude-files ".luarocks/**" -- .

      - name: Lua Syntax Check
        run: |
          set -e
          for file in $(find . -type f -name "*.lua" -not -path "./.luarocks/*"); do
            echo "Checking $file"
            tmp="$(mktemp)"
            sed '1s/^\xEF\xBB\xBF//' "$file" > "$tmp"
            lua -e "assert(loadfile('$tmp'))"
            rm -f "$tmp"
          done

      - name: Lua Metrics Check
        run: |
          eval "$(luarocks path --lua-version 5.1)"
          ISILIVE_MAX_FILE_LINES=3200 ISILIVE_MAX_FUNCTION_LINES=420 lua tools/lua_metrics_check.lua

      - name: Locale Drift Check
        run: |
          lua tools/check_locale_drift.lua

      - name: Hardcoded Strings Check
        run: |
          lua tools/check_hardcoded_strings.lua

      - name: Sound Channel Check
        run: |
          lua tools/check_sound_channel.lua

      - name: Chat Color Safety Check
        run: |
          lua tools/check_chat_color_safety.lua

      - name: WoW 12.0 API Compliance Check
        run: |
          lua tools/check_wow_api_compliance.lua

      - name: Format String Consistency Check
        run: |
          lua tools/check_format_string_consistency.lua

      - name: Secret Value Guards Check
        run: |
          lua tools/check_secret_value_guards.lua

      - name: Addon Message Size Check
        run: |
          lua tools/check_addon_message_size.lua

      - name: Button Label Length Check
        run: |
          lua tools/check_button_label_length.lua

      - name: TOC File List Check
        run: |
          lua tools/check_toc_file_list.lua

      - name: Dead Locale Keys Check
        run: |
          lua tools/check_dead_locale_keys.lua

      - name: M+ Forces DB Lifetime
        run: |
          lua tools/check_mplus_db_lifetime.lua

      - name: Nameplate Key-Start Simulator
        run: |
          lua tools/simulate_nameplate_keystart.lua all

      - name: SavedVariables Reload Simulator
        run: |
          lua tools/simulate_savedvariables_reload.lua

      - name: Key-Start Lifecycle Simulator
        run: |
          lua tools/simulate_key_start_lifecycle.lua

      - name: Hidden-Sync Reload Simulator
        run: |
          lua tools/simulate_hidden_sync_reload.lua

      - name: Raid-Party Cycle Simulator
        run: |
          lua tools/simulate_raid_party_cycle.lua

      - name: LFG Join Target Chain Simulator
        run: |
          lua tools/simulate_lfg_join_target_chain.lua

      - name: Reload-Storm Simulator
        run: |
          lua tools/simulate_reload_storm.lua

      - name: Key-Completion Lifecycle Simulator
        run: |
          lua tools/simulate_key_completion_lifecycle.lua

      - name: Deterministic Usecase + Rules Logic Validation
        run: |
          lua tools/validate_usecases.lua

      - name: Install luacov
        run: luarocks install luacov 0.15.0-1

      - name: Coverage Run
        run: |
          eval "$(luarocks path --lua-version 5.1)"
          lua -lluacov tools/validate_usecases.lua
          luacov

      - name: Coverage Summary
        run: |
          lua tools/coverage_summary.lua luacov.report.out >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage Threshold (>=80% per file)
        run: |
          lua tools/coverage_below.lua 80 luacov.report.out

      - name: Coverage Threshold (>=88% total)
        run: |
          lua tools/coverage_total_gate.lua 88 luacov.report.out

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            luacov.report.out
            luacov.stats.out
          retention-days: 30
