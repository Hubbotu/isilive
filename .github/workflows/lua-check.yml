name: Lua Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: StyLua (check)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ github.token }}
          version: "2.3.1"
          args: --check .

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.1"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: |
          luarocks install luacheck 1.2.0-1
          echo "$(luarocks path --lr-bin)" >> "$GITHUB_PATH"

      - name: Install LuaFileSystem
        run: luarocks install luafilesystem 1.8.0-1

      - name: Luacheck
        run: |
          command -v luacheck
          luacheck --version
          luacheck --exclude-files ".luarocks/**" -- .

      - name: Lua Syntax Check
        run: |
          set -e
          for file in $(find . -type f -name "*.lua" -not -path "./.luarocks/*"); do
            echo "Checking $file"
            tmp="$(mktemp)"
            sed '1s/^\xEF\xBB\xBF//' "$file" > "$tmp"
            lua -e "assert(loadfile('$tmp'))"
            rm -f "$tmp"
          done

      - name: Lua Metrics Check
        run: |
          eval "$(luarocks path --lua-version 5.1)"
          ISILIVE_MAX_FUNCTION_LINES=360 lua tools/lua_metrics_check.lua

      - name: Deterministic Usecase + Rules Logic Validation
        run: |
          lua tools/validate_usecases.lua
